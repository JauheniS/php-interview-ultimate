services:
  node:
    image: node:20
    working_dir: /app/docs
    tty: true
    stdin_open: true
    environment:
      - TYPESENSE_SEARCH_ONLY_API_KEY=${TYPESENSE_SEARCH_ONLY_API_KEY}
      - TYPESENSE_ADMIN_API_KEY=${TYPESENSE_ADMIN_API_KEY}
    volumes:
      - .:/app

  typesense:
    image: typesense/typesense:30.1
    restart: on-failure
    command: '--data-dir /data --enable-cors'
    environment:
      - TYPESENSE_DATA_DIR=/data
      - TYPESENSE_API_KEY=${TYPESENSE_ADMIN_API_KEY}
      - TYPESENSE_ENABLE_CORS=true
    volumes:
      - ./typesense-data:/data
    ports:
      - "8108:8108"

  nginx:
    image: nginx:1.21.6-alpine
    user: root
    ports:
      - "8888:80"
    volumes:
      - ./docs/build:/usr/share/nginx/html
      - ./nginx:/etc/nginx/conf.d
    restart: always
    depends_on:
      - node
      - typesense

  typesense-scraper:
    image: typesense/docsearch-scraper:0.12.0
    profiles:
      - scraper
    environment:
      - TYPESENSE_API_KEY=${TYPESENSE_ADMIN_API_KEY}
      - TYPESENSE_HOST=typesense
      - TYPESENSE_PORT=8108
      - TYPESENSE_PROTOCOL=http
      - CONFIG=/tmp/scraper-config.json
      - SYNONYMS=false
    volumes:
      - ./typesense-scraper-config.json:/tmp/scraper-config.json
    links:
      - nginx:jauhenis.com
    depends_on:
      - typesense
      - nginx

volumes:
  typesense_data: