services:
  node:
    image: node:20-alpine
    working_dir: /app
    tty: true
    stdin_open: true
    volumes:
      - ./docs:/app

  nginx:
    image: nginx:1.21.6-alpine
    user: root
    ports:
      - "8888:80"
    volumes:
      - ./docs/build:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    restart: always
    depends_on:
      - node